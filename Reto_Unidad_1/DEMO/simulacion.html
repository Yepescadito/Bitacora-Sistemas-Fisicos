<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navegando la incertidumbre</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
  <style>
    body {
      margin: 0;
      background: #ffffff;
      overflow: hidden;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <script>
    let walkers = [];
    const walkerCount = 16;
    let mapImage;
    let spawnZones = [];
    let nextSpecialSpawnTime = 0;
    let lastMouseMovedTime = 0;

    function preload() {
      mapImage = loadImage('mapa.jpg');
    }

    function setup() {
      createCanvas(windowWidth, windowHeight);
      pixelDensity(window.devicePixelRatio || 1);

      spawnZones = [
        { x: 60, y: 80, w: 180, h: 140, weight: 14 },  // oeste / noroeste de Norteamérica
        { x: 190, y: 160, w: 160, h: 140, weight: 16 }, // México / Caribe
        { x: 180, y: 340, w: 170, h: 180, weight: 14 }, // costa oeste de Sudamérica
        { x: 420, y: 90, w: 160, h: 110, weight: 10 },  // Europa nórdica / Escandinavia
        { x: 410, y: 240, w: 120, h: 170, weight: 12 }, // África oriental
        { x: 500, y: 250, w: 180, h: 180, weight: 14 }, // sur de Asia / Golfo de Bengala
        { x: 580, y: 220, w: 220, h: 180, weight: 16 }, // Sudeste asiático / Indonesia
        { x: 700, y: 320, w: 240, h: 220, weight: 14 }  // Australia / océano Pacífico sur
      ];

      for (let i = 0; i < walkerCount; i++) {
        walkers.push(new Walker());
      }
      background(255);
      if (mapImage) {
        image(mapImage, 0, 0, width, height);
      }
    }

    function draw() {
      background(255);
      if (mapImage) {
        image(mapImage, 0, 0, width, height);
      }

      const activeWalkers = walkers.filter(walker => walker.active);
      const stillThreshold = 1000;
      const mouseIsStill = millis() - lastMouseMovedTime > stillThreshold;
      const maxActive = mouseIsStill ? 500 : 5;
      if (frameCount % 15 === 0 && activeWalkers.length < maxActive) {
        const spawn = Walker.chooseSpawnLocation();
        walkers.push(new Walker(spawn.x, spawn.y, false, mouseIsStill));
      }

      if (millis() > nextSpecialSpawnTime) {
        nextSpecialSpawnTime = millis() + random(7000, 15000);
        const spawn = Walker.chooseSpawnLocation();
        walkers.push(new Walker(spawn.x, spawn.y, true));
      }

      for (let walker of walkers) {
        if (!walker.active) continue;
        if (walker.isMouseOver(mouseX, mouseY) && !walker.immune) {
          walker.active = false;
          continue;
        }
        walker.step();
        walker.show();
      }
      walkers = walkers.filter(walker => walker.active);
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
    }

    function mouseMoved() {
      lastMouseMovedTime = millis();
      return false;
    }

    class Walker {
      constructor(x = width / 2, y = height / 2, special = false, bigBias = false) {
        this.pos = createVector(x, y);
        this.vel = createVector(0, 0);
        this.baseColor = Walker.chooseColor();
        this.size = Walker.chooseSize(special, bigBias);
        this.strokeWeight = map(this.size, 4, 160, 0.8, 8);
        this.active = true;
        this.immune = special;
        this.spawnTime = millis();
        this.angle = random(TWO_PI);
        this.history = [this.pos.copy()];
      }

      static chooseColor() {
        const colors = [
          { value: '#1d6eff', weight: 50 },
          { value: '#55ccff', weight: 25 },
          { value: '#ff7f11', weight: 18 },
          { value: '#e63946', weight: 12 },
          { value: '#7b2cbf', weight: 10 }
        ];
        const total = colors.reduce((sum, item) => sum + item.weight, 0);
        let choice = random(total);
        for (let item of colors) {
          if (choice < item.weight) {
            return item.value;
          }
          choice -= item.weight;
        }
        return colors[0].value;
      }

      static chooseSize(special, bigBias) {
        if (special) {
          return random(96, 160);
        }
        const t = random();
        const biased = bigBias ? pow(t, 0.65) : pow(t, 1.5);
        return lerp(4, 160, biased);
      }

      static chooseSpawnLocation() {
        const total = spawnZones.reduce((sum, zone) => sum + zone.weight, 0);
        let choice = random(total);
        for (let zone of spawnZones) {
          if (choice < zone.weight) {
            return createVector(
              random(zone.x, zone.x + zone.w),
              random(zone.y, zone.y + zone.h)
            );
          }
          choice -= zone.weight;
        }
        return createVector(random(width), random(height));
      }

      show() {
        const isTriangle = this.baseColor === '#e63946';
        const isSquare = this.baseColor === '#ff7f11';
        const isHexagon = this.baseColor === '#7b2cbf';
        const isSpiral = this.baseColor === '#55ccff';
        const trailColor = color(this.baseColor);
        trailColor.setAlpha(100);
        stroke(trailColor);
        strokeWeight(max(1, this.strokeWeight * 0.4));
        noFill();
        for (let point of this.history) {
          if (isTriangle) {
            this.drawTriangle(point.x, point.y, this.size * 0.5, this.angle);
          } else if (isSquare) {
            this.drawSquare(point.x, point.y, this.size * 0.5, this.angle);
          } else if (isHexagon) {
            this.drawHexagon(point.x, point.y, this.size * 0.5, this.angle);
          } else if (isSpiral) {
            this.drawSpiral(point.x, point.y, this.size * 0.3, this.angle);
          } else {
            ellipse(point.x, point.y, this.size * 0.5, this.size * 0.5);
          }
        }
        const c = color(this.baseColor);
        c.setAlpha(255);
        stroke(c);
        strokeWeight(this.strokeWeight);
        if (isTriangle) {
          this.drawTriangle(this.pos.x, this.pos.y, this.size, this.angle);
        } else if (isSquare) {
          this.drawSquare(this.pos.x, this.pos.y, this.size * 0.8, this.angle);
        } else if (isHexagon) {
          this.drawHexagon(this.pos.x, this.pos.y, this.size * 0.8, this.angle);
        } else if (isSpiral) {
          this.drawSpiral(this.pos.x, this.pos.y, this.size * 0.45, this.angle);
        } else {
          ellipse(this.pos.x, this.pos.y, this.size, this.size);
        }
      }

      drawTriangle(x, y, size, angle) {
        const h = (sqrt(3) / 2) * size;
        const half = size * 0.5;
        push();
        translate(x, y);
        rotate(angle || 0);
        beginShape();
        vertex(0, -2 * h / 3);
        vertex(-half, h / 3);
        vertex(half, h / 3);
        endShape(CLOSE);
        pop();
      }

      drawHexagon(x, y, radius, angle) {
        const npoints = 6;
        const angleStep = TWO_PI / npoints;
        push();
        translate(x, y);
        rotate(angle || 0);
        beginShape();
        for (let a = 0; a < TWO_PI; a += angleStep) {
          vertex(cos(a) * radius, sin(a) * radius);
        }
        endShape(CLOSE);
        pop();
      }

      drawSquare(x, y, size, angle) {
        const half = size * 0.5;
        push();
        translate(x, y);
        rotate(angle || 0);
        rectMode(CENTER);
        rect(0, 0, size, size);
        pop();
      }

      drawSpiral(x, y, maxRadius, angle) {
        push();
        translate(x, y);
        rotate(angle || 0);
        beginShape();
        const turns = 3;
        const steps = 36;
        for (let i = 0; i <= steps; i++) {
          const t = i / steps;
          const a = t * TWO_PI * turns;
          const r = t * maxRadius;
          vertex(cos(a) * r, sin(a) * r);
        }
        endShape();
        pop();
      }

      isMouseOver(mx, my) {
        const d = dist(mx, my, this.pos.x, this.pos.y);
        return d <= this.size * 0.6;
      }

      step() {
        if (!this.active) return;
        if (random() < 0.06) {
          this.levyFlight();
        } else {
          this.randomStep();
        }
        this.pos.add(this.vel);
        this.constrainToCanvas();
        this.history.push(this.pos.copy());
        if (this.history.length > 120) {
          this.history.shift();
        }
        if (this.immune && millis() - this.spawnTime > 8000) {
          this.active = false;
        }
      }

      randomStep() {
        const choice = floor(random(4));
        this.vel.set(0, 0);
        if (choice === 0) {
          this.vel.x = 1;
        } else if (choice === 1) {
          this.vel.x = -1;
        } else if (choice === 2) {
          this.vel.y = 1;
        } else {
          this.vel.y = -1;
        }
      }

      levyFlight() {
        const angle = random(TWO_PI);
        const step = pow(random(), -1.4) * 12;
        this.vel.set(cos(angle) * step, sin(angle) * step);
      }

      constrainToCanvas() {
        const margin = this.size * 0.5;
        if (this.pos.x < margin) {
          this.pos.x = margin;
          this.vel.x *= -0.8;
        }
        if (this.pos.x > width - margin) {
          this.pos.x = width - margin;
          this.vel.x *= -0.8;
        }
        if (this.pos.y < margin) {
          this.pos.y = margin;
          this.vel.y *= -0.8;
        }
        if (this.pos.y > height - margin) {
          this.pos.y = height - margin;
          this.vel.y *= -0.8;
        }
      }
    }
  </script>
</body>
</html>
